<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <link rel="stylesheet" href=".\styles\styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <title>Design Your Own Mission</title>
  </head>
  <body>
    <header>Design Your Own Mission 8.1</header>
    <div id="page">
      <div class="flex">
        <div id="logo">
          <a target="_blank" href="https://dyom.gtagames.nl">
            <img src="./img/logo.png" />
          </a>
        </div>
        <div id="buttons">
          <button id="btn-run" class="btn-expand">Run DYOM</button>
          <div class="two-btns">
            <button id="btn-install" class="btn-normal">
              Install a mission
            </button>
            <button id="btn-upload" class="btn-normal">Upload a mission</button>
          </div>
          <div class="two-btns">
            <button id="btn-openfolder" class="btn-normal">
              Open DYOM folder
            </button>
            <button id="btn-exit" class="btn-normal">Exit</button>
          </div>
        </div>
      </div>

      <div id="installed-missions">
        <p>List of installed missions</p>
        <select name="mission" multiple>
          <option value="dyom1">Mission one</option>
          <option value="dyom2">Cool missison</option>
          <option value="dyom3">Test123</option>
          <option value="dyom4">Kill the ballas</option>
          <option value="dyom5">Landslide victory</option>
          <option value="dyom6">Mission 200</option>
          <option value="dyom7">DYOM</option>
          <option value="dyom8">Hostage rescue</option>
          <option value="dsl">Storyline</option>
        </select>

        <button id="mission-delete-btn">Delete</button>
      </div>
    </div>

    <footer>
      <a target="_blank" href="https://discordapp.com/invite/XzqxyV7"
        ><i class="fa-brands fa-discord"></i>Join our Discord!</a
      >
    </footer>
  </body>
</html>
